name: Apply floatplane update

on:
  push:
    paths:
      - .github/workflows/apply-floatplane-update.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch trip page
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          s = path.read_text(encoding='utf-8')

          if 'King Salmon → Floatplane Handoff' not in s:
              leg3 = '''  <div class="flight-card">
    <div class="flight-header"><span class="flight-leg">LEG 3</span><span class="flight-date">Sat, July 18</span></div>'''
              handoff = '''  <div class="card info">
    <div class="card-label">King Salmon → Floatplane Handoff</div>
    <div class="card-value">Branch River Air meets you at AKN</div>
    <div class="card-detail" style="color:var(--text);margin-top:.5rem">
      After landing in King Salmon, look for Branch River Air either inside the terminal with a sign or in their van in the parking lot. If you do not see them, call <a href="tel:9072463437" style="color:var(--teal);text-decoration:none;font-weight:600">(907) 246-3437</a>; the BRA office can contact the van driver.
    </div>
    <div class="card-detail" style="color:var(--text);margin-top:.35rem">
      BRA will drive the group to their river office / floatplane dock, then fly you about 25 miles north to the Alagnak Lodge dock. Flight time is about 20 minutes in the air plus water taxi time at both ends.
    </div>
    <div class="card-detail" style="color:var(--gray);margin-top:.35rem">
      Tip from the lodge: arrive in King Salmon on a morning flight and depart on a mid-afternoon flight because BRA handles lodge transfers during the mid-day window.
    </div>
  </div>

'''
              if leg3 not in s:
                  raise SystemExit('Could not find Leg 3 insertion point')
              s = s.replace(leg3, handoff + leg3, 1)

          if 'Confirmation & Reference Numbers' not in s:
              hotel = '''  <div class="card success">
    <div class="card-label">Hotel – Return Night</div>
    <div class="card-value">Fairfield by Marriott Inn & Suites Anchorage Midtown</div>
    <div class="card-detail">Jul 18–19 &nbsp;•&nbsp; Conf# 82654317 &nbsp;•&nbsp; 54,000 Bonvoy Points</div>
  </div>'''
              refs = '''  <div class="card success">
    <div class="card-label">Hotel – Return Night</div>
    <div class="card-value">Fairfield by Marriott Inn & Suites Anchorage Midtown</div>
    <div class="card-detail">Jul 18–19 &nbsp;•&nbsp; Conf# 82654317 &nbsp;•&nbsp; 54,000 Bonvoy Points</div>
  </div>
  <div class="card info">
    <div class="card-label">Confirmation & Reference Numbers</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-top:.5rem;">
      <div class="card-detail"><strong>American Airlines:</strong> FFXTAY (AA 395 / AA 407)</div>
      <div class="card-detail"><strong>Alaska Airlines:</strong> AS 2158 / AS 352</div>
      <div class="card-detail"><strong>Courtyard ANC Airport:</strong> Conf# 84475616</div>
      <div class="card-detail"><strong>Fairfield ANC Midtown:</strong> Conf# 82654317</div>
      <div class="card-detail"><strong>Branch River Air:</strong> (907) 246-3437</div>
      <div class="card-detail"><strong>Alagnak Lodge / Tony:</strong> (808) 227-9301</div>
    </div>
  </div>'''
              if hotel not in s:
                  raise SystemExit('Could not find hotel reference insertion point')
              s = s.replace(hotel, refs, 1)

          old_day2 = '''      <div class="activity"><div class="act-time">12:46 PM</div><div class="act-desc">Arrive King Salmon (AKN) – met by Branch River Air (907-246-3437)</div></div>
      <div class="activity"><div class="act-time">Afternoon</div><div class="act-desc">Floatplane to Alagnak Lodge – 20 min scenic flight over the tundra</div></div>'''
          new_day2 = '''      <div class="activity"><div class="act-time">12:46 PM</div><div class="act-desc">Arrive King Salmon (AKN) – look for Branch River Air in the terminal with a sign or in their van in the parking lot</div></div>
      <div class="activity"><div class="act-time"></div><div class="act-desc">If you do not see BRA, call (907) 246-3437; the office can contact the van driver</div></div>
      <div class="activity"><div class="act-time">Afternoon</div><div class="act-desc">BRA drives you to their river office / floatplane dock, then flies you about 25 miles to Alagnak Lodge</div></div>
      <div class="activity"><div class="act-time"></div><div class="act-desc">Floatplane time is about 20 minutes in the air plus water taxi time at both ends</div></div>'''
          s = s.replace(old_day2, new_day2, 1)

          old_day7 = '''      <div class="activity"><div class="act-time"></div><div class="act-desc">Pack up, settle charges – lodge needs you out 2+ hrs before your AKN flight</div></div>'''
          new_day7 = '''      <div class="activity"><div class="act-time"></div><div class="act-desc">Pack up, settle charges – lodge needs you out 2+ hrs before your AKN flight because TSA requires check-in and bag inspection at least 1 hr before departure</div></div>'''
          s = s.replace(old_day7, new_day7, 1)

          old_contact = '''  <div class="contact-card"><div class="contact-icon">🛩️</div><div class="contact-info"><div class="contact-name">Branch River Air</div><div class="contact-detail"><a href="tel:9072463437">(907) 246-3437</a> &nbsp;•&nbsp; Floatplane: AKN ↔ Lodge</div></div></div>'''
          new_contact = '''  <div class="contact-card"><div class="contact-icon">🛩️</div><div class="contact-info"><div class="contact-name">Branch River Air</div><div class="contact-detail"><a href="tel:9072463437">(907) 246-3437</a> &nbsp;•&nbsp; AKN pickup, van transfer & floatplane dock</div></div></div>'''
          s = s.replace(old_contact, new_contact, 1)

          path.write_text(s, encoding='utf-8', newline='\n')
          wf = Path('.github/workflows/apply-floatplane-update.yml')
          if wf.exists():
              wf.unlink()
          PY
      - name: Commit patched page
        run: |
          git config user.name "codex"
          git config user.email "codex@openai.com"
          git add index.html .github/workflows/apply-floatplane-update.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add floatplane transfer instructions"
            git push
          fi
